<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Noden® — Cart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body>
  <div class="cursor-dot"></div>
  <div class="cursor-outline"></div>
  <header class="global-nav">
    <div class="mini-logo">Noden<sup>®</sup></div>
    <nav class="link-matrix">
      <div class="link-col">
        <a class="navlink" href="index.html">Home</a>
        <a href="about.html" class="navlink">About</a>
        <a class="navlink" href="products.html">Catalog</a>
        <a class="navlink" href="contact.html">Contact</a>
        <a class="navlink active" href="cart.html">Cart (<span id="cartBadge">0</span>)</a>
      </div>
    </nav>
  </header>

  <div class="page">
    <section class="cart-section">
      <div class="container">
        <h1 class="products-title">Your Cart</h1>
        <div id="cartItems"></div>
        <div class="cart-total" id="cartTotal"></div>
        <button class="modal-cta" id="placeOrderBtn" style="margin-top: 32px;">Place Order</button>
        <div id="orderConfirm" style="display: none; margin-top: 24px; padding: 20px; background: #10b981; color: white; border-radius: 8px;">Order sent via WhatsApp! Cart cleared.</div>
      </div>
    </section>
  </div>

  <script src="js/cursor.js"></script>
  <script src="js/cart.js"></script>
</body>
</html>
